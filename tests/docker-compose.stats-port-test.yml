services:
  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - SECRET=${TELEPROXY_SECRET}
      - PORT=8443
      - STATS_PORT=9999
      - WORKERS=1
    # No healthcheck override — tests that Dockerfile's HEALTHCHECK
    # correctly uses ${STATS_PORT:-8888} instead of hardcoded 8888
