services:
  teleproxy:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        DEBUG_TOOLS: "1"
    ports:
      - "18443:8443"
      - "18888:8888"
    environment:
      # No SECRET — tests that auto-generation writes to TOML config
      - PORT=8443
      - WORKERS=1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/stats || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
  tester:
    build: .
    environment:
      - TELEPROXY_HOST=teleproxy
      - TELEPROXY_STATS_PORT=8888
    depends_on:
      teleproxy:
        condition: service_healthy
    command: ["python", "test_autosecret.py"]
